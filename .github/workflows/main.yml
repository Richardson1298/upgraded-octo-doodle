name: Build TouchControls Mod

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Download Gradle 4.10.3 directly
        run: |
          wget -q https://services.gradle.org/distributions/gradle-4.10.3-bin.zip
          unzip -q gradle-4.10.3-bin.zip
          echo "$GITHUB_WORKSPACE/gradle-4.10.3/bin" >> $GITHUB_PATH

      - name: Verify Gradle version
        run: gradle -version

      - name: Generate Gradle wrapper (4.10.3)
        run: |
          gradle wrapper --gradle-version 4.10.3
          chmod +x gradlew

      - name: Build with Gradle wrapper
        run: ./gradlew build --stacktrace --no-daemon

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: TouchControls-jar
          path: build/libs/*.jar
